# Basic Authentication Configuration
# Protect HTML files on filesystem AND all URL paths with consistent auth realm
# Directory protects actual files, Location protects all URL requests
# Single AuthName ensures browser caches credentials for all requests

<Directory /var/www/html>
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Directory>

<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>

# Exclude health checks from auth
<Location /health>
    Require all granted
</Location>

# Exclude static icons from auth
<Location /icons>
    Require all granted
</Location>
