# Basic Authentication Configuration
# Protect HTML files on filesystem using Directory
# Protect proxied service paths using Location
# Single AuthName ensures browser caches credentials for all requests

<Directory /var/www/html>
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Directory>

# Protect proxied service paths (don't protect HTML files here to avoid double-auth)
<LocationMatch "^/(sabnzbd|nzbget|nzbhydra|deluge|transmission|qbittorrent|radarr|sonarr|lidarr|whisparr|prowlarr|seerr|bazarr|jellyfin|tautulli|emby|plex)/">
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</LocationMatch>

# Exclude health checks from auth
<Location /health>
    Require all granted
</Location>

# Exclude static icons from auth
<Location /icons>
    Require all granted
</Location>
