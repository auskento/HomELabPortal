# Basic Authentication Configuration
# Protect all requests with consistent AuthName for proper credential caching
# Exclude only health checks and static assets

# Exclude health checks from auth
<Location /health>
    Require all granted
</Location>

# Exclude static icons from auth
<Location /icons>
    Require all granted
</Location>

# Protect filesystem HTML files
<Directory /var/www/html>
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Directory>

# Protect all other requests (catch-all)
<Location />
    AuthType Basic
    AuthName "HomELabPortal"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</Location>
