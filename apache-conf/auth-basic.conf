# Basic Authentication Configuration
# This file is included in the virtual host when ENABLE_BASIC_AUTH is true

<LocationMatch "^/(?!health|icons|sonarr|radarr|whisparr|lidarr|prowlarr|overseerr|jellyfin|emby|plex|tautulli|transmission|qbittorrent|sabnzbd|deluge|custom)">
    AuthType Basic
    AuthName "Authentication Required"
    AuthUserFile /etc/apache2/.htpasswd
    Require valid-user
</LocationMatch>
