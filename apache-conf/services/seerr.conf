# Seerr Reverse Proxy Configuration
<Location /seerr>
    ProxyPass http://seerr:5055/
    ProxyPassReverse http://seerr:5055/
    
    # Seerr-specific settings
    
    # Headers for websocket support
    ProxyPreserveHost On
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}e
</Location>

<Location /seerr/api>
    ProxyPass http://seerr:5055/api
    ProxyPassReverse http://seerr:5055/api
</Location>

# WebSocket support for real-time updates
<Location /seerr/socket.io>
    ProxyPass ws://seerr:5055/socket.io
    ProxyPassReverse ws://seerr:5055/socket.io
</Location>
